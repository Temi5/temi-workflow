name: Docker Hub Push and Server Deploy (Temi)

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    name: Build Docker Image, Push to Hub, Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Set up the Docker Build engine inside the GitHub runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into Temi's personal Docker Hub account using saved secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the Dockerfile and push it live to Temi's Docker Hub registry
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # This maps to Temi's personal Docker Hub repository space
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vuna-calculator:latest

      # Finalize by running the secure update tracking over the VPS shell
      - name: Execute Remote SSH Pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # Clean up existing public files safely without violating rbash restrictions
            find public_html/ -mindepth 1 -delete
            
            # Pull down the latest workspace tracking layout for Temi
            git clone https://github.com/Temi5/temi-workflow public_html/